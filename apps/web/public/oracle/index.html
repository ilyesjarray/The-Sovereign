<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="/oracle/manifest.json">
<link rel="icon" href="/logo.png">
<link rel="apple-touch-icon" href="/logo.png">
<title>Oracle</title>
<link rel="stylesheet" href="/oracle/style.css">
</head>
<body>
<div id="app">
  <!-- Install Banner -->
  <div class="install-banner" id="installBanner">
    <span>⚡ Install Oracle App</span>
    <button class="install-btn" id="installBtn">Install</button>
  </div>

  <!-- Header -->
  <div class="header">
    <div class="header-title">
      <img src="/logo.png" alt="Logo">
      Oracle
    </div>
  </div>

  <!-- CHAT AREA -->
  <div class="chat-msgs" id="chatMsgs"></div>

  <!-- INPUT AREA -->
  <div class="input-area">
    <div class="attachment-preview" id="attachmentPreview">
      <img id="previewImg" src="">
      <button class="remove-attachment" id="removeAttachment">✕</button>
    </div>
    
    <div class="input-wrapper">
      <input type="file" id="fileInput" accept="image/*" style="display:none">
      <button class="attach-btn" id="attachBtn" title="Attach Image">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"></path></svg>
      </button>
      
      <textarea id="chatInput" class="text-input" rows="1" placeholder="Message Oracle... (use /imagine for images)"></textarea>
      
      <button class="send-btn" id="sendBtn" title="Send">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
      </button>
    </div>
  </div>
</div>

<div class="fs-overlay" id="fsOverlay">
  <img id="fsImg" src="">
</div>

<script src="/oracle/app.js"></script>
</body>
</html>
